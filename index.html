<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AiChat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0c10;--bg2:#13131a;--bg3:#1c1c26;--bg4:#242432;
  --text:#eeeef5;--text2:#8888aa;--border:#2a2a3d;
  --accent:#7b6ff0;--accent-dim:#4a3fc0;--accent-glow:rgba(123,111,240,0.15);
  --user-bubble:#3d3580;--ai-bubble:#1c1c26;--input-bg:#13131a;
}
.light{
  --bg:#f0f0f5;--bg2:#ffffff;--bg3:#e8e8f0;--bg4:#dcdcec;
  --text:#1a1a2e;--text2:#666688;--border:#d0d0e0;
  --accent:#5b4fd4;--accent-dim:#4a3fb8;--accent-glow:rgba(91,79,212,0.12);
  --user-bubble:#5b4fd4;--ai-bubble:#ffffff;--input-bg:#ffffff;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;transition:background .3s,color .3s}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;transition:background .3s,border-color .3s}
.logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:600;letter-spacing:-.3px}
.logo-mark{width:32px;height:32px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;font-family:'DM Mono',monospace}
.topbar-actions{display:flex;align-items:center;gap:8px}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;font-weight:500}
.btn-ghost:hover{background:var(--bg3);color:var(--text);border-color:var(--accent)}
.theme-toggle{width:52px;height:28px;background:var(--bg4);border:1px solid var(--border);border-radius:14px;cursor:pointer;position:relative;transition:background .3s,border-color .3s}
.theme-toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:var(--accent);transition:left .25s cubic-bezier(.4,0,.2,1)}
.light .theme-toggle::after{left:27px}
.toggle-icon{position:absolute;font-size:11px;top:50%;transform:translateY(-50%)}
.toggle-icon.moon{left:6px}.toggle-icon.sun{right:6px}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:12px;gap:2px;overflow-y:auto;flex-shrink:0;transition:background .3s,border-color .3s}
.new-btn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;margin-bottom:10px;transition:background .15s,transform .1s}
.new-btn:hover{background:var(--accent-dim)}.new-btn:active{transform:scale(.98)}
.sidebar-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;padding:8px 10px 4px}
.sidebar-item{padding:8px 12px;border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;transition:background .1s,color .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-item:hover{background:var(--bg3);color:var(--text)}
.sidebar-item.active{background:var(--accent-glow);color:var(--accent);font-weight:500}
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.messages{flex:1;overflow-y:auto;padding:28px 24px;display:flex;flex-direction:column;gap:20px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;text-align:center;padding:40px;animation:fadeIn .5s ease}
.welcome-icon{width:60px;height:60px;border-radius:18px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:4px}
.welcome h2{font-size:22px;font-weight:600;letter-spacing:-.3px}
.welcome p{color:var(--text2);font-size:14px;max-width:340px;line-height:1.6}
.suggestions{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:480px;margin-top:8px}
.suggestion{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--text2);cursor:pointer;text-align:left;transition:all .15s;font-family:'DM Sans',sans-serif}
.suggestion:hover{border-color:var(--accent);color:var(--text);background:var(--accent-glow)}
.msg-row{display:flex;gap:12px;align-items:flex-start;animation:fadeSlide .25s ease}
.msg-row.user{flex-direction:row-reverse}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;margin-top:2px}
.avatar.ai{background:var(--accent);color:#fff}.avatar.user{background:var(--bg4);color:var(--text2)}
.bubble{max-width:68%;padding:11px 16px;border-radius:16px;font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.bubble.ai{background:var(--ai-bubble);color:var(--text);border:1px solid var(--border);border-top-left-radius:4px}
.bubble.user{background:var(--user-bubble);color:#fff;border-top-right-radius:4px}
.typing-dots{display:flex;gap:5px;align-items:center;padding:14px 16px;background:var(--ai-bubble);border:1px solid var(--border);border-radius:16px;border-top-left-radius:4px}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--accent);display:block;animation:blink 1s infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes blink{0%,60%,100%{transform:scale(1);opacity:.5}30%{transform:scale(1.2);opacity:1}}
.input-bar{padding:14px 20px 18px;background:var(--bg2);border-top:1px solid var(--border);transition:background .3s,border-color .3s}
.input-wrap{display:flex;align-items:flex-end;gap:10px;background:var(--input-bg);border:1.5px solid var(--border);border-radius:14px;padding:8px 8px 8px 16px;transition:border-color .2s,box-shadow .2s}
.input-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
#userInput{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;resize:none;max-height:120px;min-height:24px;line-height:1.5;padding:4px 0}
#userInput::placeholder{color:var(--text2)}
.send-btn{width:36px;height:36px;border-radius:10px;background:var(--accent);border:none;cursor:pointer;color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,transform .1s;align-self:flex-end}
.send-btn:hover{background:var(--accent-dim)}.send-btn:active{transform:scale(.93)}.send-btn:disabled{opacity:.4;cursor:not-allowed}
.hint{text-align:center;font-size:11px;color:var(--text2);margin-top:10px;opacity:.7}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-mark">A</div>
    AiChat
  </div>
  <div class="topbar-actions">
    <button class="btn-ghost" onclick="clearChat()">새 채팅</button>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="테마 전환">
      <span class="toggle-icon moon">🌙</span>
      <span class="toggle-icon sun">☀️</span>
    </button>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <button class="new-btn" onclick="clearChat()">＋ 새 대화</button>
    <div class="sidebar-label">메뉴</div>
    <div class="sidebar-item active">💬 현재 대화</div>
    <div class="sidebar-item" onclick="loadSample('math')">🔢 수학 문제</div>
    <div class="sidebar-item" onclick="loadSample('code')">💻 코딩 도움</div>
    <div class="sidebar-item" onclick="loadSample('write')">✍️ 글쓰기</div>
  </div>

  <div class="chat-wrap">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🤖</div>
        <h2>AiChat에 오신 걸 환영해요!</h2>
        <p>무엇이든 물어보세요. 코딩, 글쓰기, 수학, 번역 — 다 도와드릴 수 있어요.</p>
        <div class="suggestions">
          <button class="suggestion" onclick="suggest('파이썬으로 간단한 계산기 코드 짜줘')">💻 코드 짜줘</button>
          <button class="suggestion" onclick="suggest('오늘 할 일 목록 정리 도와줘')">📋 할 일 정리</button>
          <button class="suggestion" onclick="suggest('한국어를 영어로 번역해줘: 안녕하세요!')">🌐 번역해줘</button>
          <button class="suggestion" onclick="suggest('창의적인 단편소설 아이디어 3개 줘')">✨ 아이디어</button>
        </div>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="userInput" placeholder="메시지 입력..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMsg()">↑</button>
      </div>
      <div class="hint">Enter로 전송 · Shift+Enter로 줄바꿈</div>
    </div>
  </div>
</div>

<script>
let isLight = localStorage.getItem('aichat_theme') === 'light';
let isTyping = false;
let chatHistory = [];

if(isLight) document.body.classList.add('light');

function toggleTheme(){
  isLight = !isLight;
  document.body.classList.toggle('light', isLight);
  localStorage.setItem('aichat_theme', isLight ? 'light' : 'dark');
}

function clearChat(){
  chatHistory = [];
  document.getElementById('messages').innerHTML = `
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h2>AiChat에 오신 걸 환영해요!</h2>
      <p>무엇이든 물어보세요. 코딩, 글쓰기, 수학, 번역 — 다 도와드릴 수 있어요.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="suggest('파이썬으로 간단한 계산기 코드 짜줘')">💻 코드 짜줘</button>
        <button class="suggestion" onclick="suggest('오늘 할 일 목록 정리 도와줘')">📋 할 일 정리</button>
        <button class="suggestion" onclick="suggest('한국어를 영어로 번역해줘: 안녕하세요!')">🌐 번역해줘</button>
        <button class="suggestion" onclick="suggest('창의적인 단편소설 아이디어 3개 줘')">✨ 아이디어</button>
      </div>
    </div>`;
}

function suggest(text){ document.getElementById('userInput').value = text; sendMsg(); }
function loadSample(type){
  clearChat();
  suggest({math:'피타고라스 정리 설명해줘',code:'자바스크립트로 버블정렬 구현해줘',write:'여행 블로그 포스트 시작 문장 3개 써줘'}[type]);
}

function addMsg(text, role){
  const welcome = document.getElementById('welcome');
  if(welcome) welcome.remove();
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  const av = document.createElement('div');
  av.className = 'avatar ' + role;
  av.textContent = role==='ai' ? 'A' : '나';
  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + role;
  bubble.textContent = text;
  row.appendChild(av); row.appendChild(bubble);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping(){
  const welcome = document.getElementById('welcome');
  if(welcome) welcome.remove();
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ai'; row.id = 'typing-row';
  const av = document.createElement('div');
  av.className = 'avatar ai'; av.textContent = 'A';
  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(av); row.appendChild(dots);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping(){ const t=document.getElementById('typing-row'); if(t) t.remove(); }
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }

async function sendMsg(){
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if(!text || isTyping) return;
  isTyping = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = ''; input.style.height = 'auto';
  addMsg(text, 'user');
  chatHistory.push({role:'user', content:text});
  showTyping();

  try{
    // ★ 여기가 핵심: 내 서버(/api/chat)로 보냄 — API 키 노출 없음
    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ messages: chatHistory })
    });
    const data = await res.json();
    removeTyping();
    if(data.error){
      addMsg('오류: ' + data.error.message, 'ai');
    } else {
      const reply = data.content?.find(c=>c.type==='text')?.text || '응답을 받지 못했어요.';
      chatHistory.push({role:'assistant', content:reply});
      addMsg(reply, 'ai');
    }
  } catch(err){
    removeTyping();
    addMsg('네트워크 오류가 발생했어요. 다시 시도해주세요.', 'ai');
  }

  isTyping = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}
</script>
</body>
</html>
